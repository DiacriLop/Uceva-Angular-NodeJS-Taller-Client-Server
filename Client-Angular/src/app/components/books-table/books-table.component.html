<table class="table table-striped">
<thead>
    <tr>
    <th>ID</th>
    <th>Título</th>
    <th>Autor</th>
    <th>Editorial</th>
    <th>Género</th>
    </tr>
</thead>
<tbody>

    @for (book of books; track book) {
    <tr>
    <th scope="row">{{ book.id }}</th>
    <td>{{ book.title }}</td>
    <td>{{ book.author }}</td>
    <td>{{ book.publisher }}</td>
    <td>
        <dsb-badge-atom
        [text]="book.genre"
        [type]="genreMap[book.genre]">
        </dsb-badge-atom>
    </td>
    </tr>
}
</tbody>
</table>
