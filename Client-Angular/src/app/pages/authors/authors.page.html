@switch(state){

    @case('loading'){
        <app-alert alertState="loading" text="Cargando Autores..." ></app-alert>
    }

    @case('error'){
        <app-alert alertState="error" text="Error al Cargar los Autores" ></app-alert>
    }

    @case('success'){
        <app-authors-table [authors]="authors" ></app-authors-table>
    }

}
