@switch(state){

    @case('loading'){
        <app-alert alertState="loading" text="Cargando Peliculas..." ></app-alert>
    }

    @case('error'){
        <app-alert alertState="error" text="Error al Cargar las Peliculas" ></app-alert>
    }

    @case('success'){
        <app-movies-table [movies]="movies"></app-movies-table>
    }

}
